<script>
    // Auto-detect environment
    window.API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:5000/api' 
        : '/api';
        
    console.log('🌐 API URL:', window.API_URL);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - SILA WEB HOSTING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --primary-light: #4d94ff;
            --secondary: #00cc99;
            --accent: #ff3366;
            --dark: #0a0a0a;
            --dark-2: #111111;
            --dark-3: #1a1a1a;
            --dark-4: #222222;
            --light: #ffffff;
            --gray-1: #f5f5f5;
            --gray-2: #e0e0e0;
            --gray-3: #b0b0b0;
            --gray-4: #808080;
            --success: #00cc99;
            --warning: #ffaa00;
            --error: #ff3366;
            --gradient-1: linear-gradient(135deg, #0066ff, #00cc99);
            --gradient-2: linear-gradient(135deg, #0066ff, #ff3366);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 8px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 16px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(0,102,255,0.3);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --border-radius-xl: 24px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .otp-container {
            max-width: 450px;
            width: 100%;
            background: var(--dark-2);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            border: 1px solid rgba(0,102,255,0.2);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--light);
        }

        .email-display {
            background: var(--dark-3);
            padding: 15px;
            border-radius: var(--border-radius-sm);
            margin-bottom: 30px;
            border: 1px solid rgba(0,102,255,0.3);
        }

        .email-display span {
            color: var(--primary);
            font-weight: 600;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 60px;
            height: 70px;
            background: var(--dark-3);
            border: 2px solid rgba(0,102,255,0.3);
            border-radius: var(--border-radius-sm);
            color: var(--light);
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            transition: var(--transition);
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .timer {
            font-size: 18px;
            color: var(--gray-3);
            margin-bottom: 20px;
        }

        .timer span {
            color: var(--primary);
            font-weight: 700;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient-1);
            color: var(--light);
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-resend {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-resend:hover {
            background: var(--primary);
            color: var(--light);
        }

        .btn-resend:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(255,51,102,0.1);
            border: 1px solid var(--error);
            border-radius: var(--border-radius-sm);
            padding: 15px;
            color: var(--error);
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            margin-top: 20px;
        }

        .back-link a {
            color: var(--gray-3);
            text-decoration: none;
        }

        .info-text {
            color: var(--gray-3);
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <div class="logo">SILA WEB HOSTING</div>
        <h2>Verify Your Email</h2>
        
        <div class="email-display">
            We sent a code to <span id="displayEmail"></span>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="info-text">Enter the 6-digit code from your email</div>
        
        <form id="otpForm">
            <div class="otp-inputs">
                <input type="text" class="otp-input" id="otp1" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-input" id="otp2" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-input" id="otp3" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-input" id="otp4" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-input" id="otp5" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-input" id="otp6" maxlength="1" pattern="[0-9]" inputmode="numeric">
            </div>
            
            <div class="timer" id="timer">Time remaining: <span id="time">10:00</span></div>
            
            <button type="submit" class="btn">Verify OTP</button>
            <button type="button" class="btn btn-resend" id="resendBtn" disabled>Resend Code</button>
        </form>
        
        <div class="loader" id="loader"></div>
        
        <div class="back-link">
            <a href="/login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Get email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        if (email) {
            document.getElementById('displayEmail').textContent = email;
        } else {
            window.location.href = '/login.html';
        }

        // OTP input handling
        const otpInputs = document.querySelectorAll('.otp-input');
        
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Only allow numbers
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = e.clipboardData.getData('text');
                const numbers = paste.replace(/[^0-9]/g, '').split('');
                
                numbers.forEach((num, i) => {
                    if (i < otpInputs.length) {
                        otpInputs[i].value = num;
                    }
                });
                
                if (numbers.length === otpInputs.length) {
                    document.getElementById('otpForm').dispatchEvent(new Event('submit'));
                }
            });
        });

        // Timer
        let timeLeft = 600; // 10 minutes in seconds
        const timerElement = document.getElementById('time');
        const resendBtn = document.getElementById('resendBtn');

        const timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerElement.textContent = '00:00';
                resendBtn.disabled = false;
            } else {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);

        // Resend OTP
        resendBtn.addEventListener('click', async () => {
            const errorMessage = document.getElementById('errorMessage');
            
            try {
                resendBtn.disabled = true;
                
                const response = await fetch(`${API_URL}/auth/resend-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    // Reset timer
                    timeLeft = 600;
                    resendBtn.disabled = true;
                    errorMessage.textContent = 'New OTP sent successfully!';
                    errorMessage.style.color = 'var(--success)';
                    errorMessage.style.background = 'rgba(0,204,153,0.1)';
                    errorMessage.style.border = '1px solid var(--success)';
                    errorMessage.classList.add('show');
                    
                    setTimeout(() => {
                        errorMessage.classList.remove('show');
                    }, 3000);
                } else {
                    throw new Error(data.error || 'Failed to resend OTP');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.color = 'var(--error)';
                errorMessage.style.background = 'rgba(255,51,102,0.1)';
                errorMessage.style.border = '1px solid var(--error)';
                errorMessage.classList.add('show');
                resendBtn.disabled = false;
            }
        });

        // Form submission
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            const errorMessage = document.getElementById('errorMessage');
            const loader = document.getElementById('loader');
            const submitBtn = document.querySelector('.btn[type="submit"]');

            if (otp.length !== 6) {
                errorMessage.textContent = 'Please enter complete 6-digit OTP';
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            loader.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/verify-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, otp }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    // Redirect to dashboard
                    window.location.href = '/dashboard.html';
                } else {
                    errorMessage.textContent = data.error || 'Invalid OTP';
                    errorMessage.classList.add('show');
                    
                    // Clear OTP inputs
                    otpInputs.forEach(input => input.value = '');
                    otpInputs[0].focus();
                }
            } catch (error) {
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
