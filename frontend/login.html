<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SILA WEB HOSTING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --primary-light: #4d94ff;
            --secondary: #00cc99;
            --accent: #ff3366;
            --dark: #0a0a0a;
            --dark-2: #111111;
            --dark-3: #1a1a1a;
            --dark-4: #222222;
            --light: #ffffff;
            --gray-1: #f5f5f5;
            --gray-2: #e0e0e0;
            --gray-3: #b0b0b0;
            --gray-4: #808080;
            --success: #00cc99;
            --warning: #ffaa00;
            --error: #ff3366;
            --gradient-1: linear-gradient(135deg, #0066ff, #00cc99);
            --gradient-2: linear-gradient(135deg, #0066ff, #ff3366);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 8px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 16px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(0,102,255,0.3);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --border-radius-xl: 24px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: var(--dark-2);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            border: 1px solid rgba(0,102,255,0.2);
            box-shadow: var(--shadow-lg);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--light);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gray-3);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: var(--dark-3);
            border: 1px solid rgba(0,102,255,0.3);
            border-radius: var(--border-radius-sm);
            color: var(--light);
            font-size: 16px;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient-1);
            color: var(--light);
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(255,51,102,0.1);
            border: 1px solid var(--error);
            border-radius: var(--border-radius-sm);
            padding: 15px;
            color: var(--error);
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--gray-3);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">SILA WEB HOSTING</div>
        <h2>Welcome Back</h2>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn">Login</button>
        </form>
        
        <div class="loader" id="loader"></div>
        
        <div class="links">
            <a href="/register.html">Don't have an account? Register</a>
        </div>
        
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loader = document.getElementById('loader');
            const submitBtn = document.querySelector('.btn');

            // Hide previous error
            errorMessage.classList.remove('show');
            
            // Show loader
            loader.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    if (data.data.requiresOTP) {
                        // Redirect to OTP verification
                        window.location.href = `/verify-otp.html?email=${encodeURIComponent(email)}`;
                    } else {
                        // Login successful
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorMessage.textContent = data.error || 'Login failed';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
