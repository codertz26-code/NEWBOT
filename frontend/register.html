<script>
    // Auto-detect environment
    window.API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:5000/api' 
        : '/api';
        
    console.log('🌐 API URL:', window.API_URL);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SILA WEB HOSTING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --primary-light: #4d94ff;
            --secondary: #00cc99;
            --accent: #ff3366;
            --dark: #0a0a0a;
            --dark-2: #111111;
            --dark-3: #1a1a1a;
            --dark-4: #222222;
            --light: #ffffff;
            --gray-1: #f5f5f5;
            --gray-2: #e0e0e0;
            --gray-3: #b0b0b0;
            --gray-4: #808080;
            --success: #00cc99;
            --warning: #ffaa00;
            --error: #ff3366;
            --gradient-1: linear-gradient(135deg, #0066ff, #00cc99);
            --gradient-2: linear-gradient(135deg, #0066ff, #ff3366);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 8px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 16px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(0,102,255,0.3);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --border-radius-xl: 24px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            max-width: 450px;
            width: 100%;
            background: var(--dark-2);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            border: 1px solid rgba(0,102,255,0.2);
            box-shadow: var(--shadow-lg);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--light);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gray-3);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: var(--dark-3);
            border: 1px solid rgba(0,102,255,0.3);
            border-radius: var(--border-radius-sm);
            color: var(--light);
            font-size: 16px;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .password-strength {
            margin-top: 5px;
            height: 4px;
            background: var(--dark-4);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: var(--transition);
        }

        .strength-bar.weak {
            width: 33%;
            background: var(--error);
        }

        .strength-bar.medium {
            width: 66%;
            background: var(--warning);
        }

        .strength-bar.strong {
            width: 100%;
            background: var(--success);
        }

        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            color: var(--gray-3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient-1);
            color: var(--light);
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(255,51,102,0.1);
            border: 1px solid var(--error);
            border-radius: var(--border-radius-sm);
            padding: 15px;
            color: var(--error);
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--gray-3);
            text-decoration: none;
        }

        .terms {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terms input {
            width: auto;
        }

        .terms label {
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">SILA WEB HOSTING</div>
        <h2>Create Account</h2>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Choose a username" minlength="3" maxlength="30">
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Create a password" minlength="6">
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText">Password must be at least 6 characters</div>
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm your password">
            </div>
            
            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
            </div>
            
            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <div class="loader" id="loader"></div>
        
        <div class="links">
            <a href="/login.html">Already have an account? Login</a>
        </div>
        
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            strengthBar.className = 'strength-bar';
            
            if (password.length < 6) {
                strengthBar.style.width = '0%';
                strengthText.textContent = 'Password must be at least 6 characters';
            } else if (strength <= 2) {
                strengthBar.classList.add('weak');
                strengthText.textContent = 'Weak password';
            } else if (strength <= 4) {
                strengthBar.classList.add('medium');
                strengthText.textContent = 'Medium password';
            } else {
                strengthBar.classList.add('strong');
                strengthText.textContent = 'Strong password';
            }
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const errorMessage = document.getElementById('errorMessage');
            const loader = document.getElementById('loader');
            const submitBtn = document.querySelector('.btn');

            // Validation
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.classList.add('show');
                return;
            }

            if (!terms) {
                errorMessage.textContent = 'You must agree to the Terms of Service';
                errorMessage.classList.add('show');
                return;
            }

            // Hide previous error
            errorMessage.classList.remove('show');
            
            // Show loader
            loader.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    // Redirect to OTP verification
                    window.location.href = `/verify-otp.html?email=${encodeURIComponent(email)}`;
                } else {
                    errorMessage.textContent = data.error || 'Registration failed';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
